version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${DB_USERNAME:-app_user} -d ${DB_DATABASE:-ecommerce}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./ecommerce-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-app_user}
      DB_PASSWORD: ${DB_PASSWORD:-DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-ecommerce}
      DB_SYNCHRONIZE: "false"
      DB_LOGGING: "false"
      DB_POOL_SIZE: 20
      DB_SSL: "false"

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      JWT_SECRET: ${JWT_SECRET:-JWT_SECRET}
      JWT_ABSOLUTE_EXPIRES_IN: ${JWT_ABSOLUTE_EXPIRES_IN:-12h}
      SESSION_INACTIVITY_TIMEOUT_SECONDS: ${SESSION_INACTIVITY_TIMEOUT_SECONDS:-3600}

      LOGIN_RATE_LIMIT_IP_MAX: ${LOGIN_RATE_LIMIT_IP_MAX:-10}
      LOGIN_RATE_LIMIT_IP_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_IP_WINDOW_SECONDS:-60}
      LOGIN_LOCKOUT_MAX_ATTEMPTS: ${LOGIN_LOCKOUT_MAX_ATTEMPTS:-5}
      LOGIN_LOCKOUT_WINDOW_SECONDS: ${LOGIN_LOCKOUT_WINDOW_SECONDS:-900}
      LOGIN_LOCKOUT_DURATION_SECONDS: ${LOGIN_LOCKOUT_DURATION_SECONDS:-900}

      SEED_DEMO_USER_PASSWORD: ${SEED_DEMO_USER_PASSWORD:-Password@2026}
      SEED_PRODUCT_COUNT: ${SEED_PRODUCT_COUNT:-5000}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/ecom/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./ecommerce-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002/ecom/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3001:3001"

volumes:
  postgres_data: